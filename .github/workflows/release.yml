name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-release:
    uses: ./.github/workflows/build-release.yml

  build-debug:
    uses: ./.github/workflows/build-debug.yml

  publish:
    name: Publish GitHub Release
    needs: [build-release, build-debug]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: sendspin-armv6-linux-armv6-bullseye-release

      - name: Download debug artifact
        uses: actions/download-artifact@v4
        with:
          name: sendspin-armv6-linux-armv6-bullseye-debug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sendspin-armv6-linux-armv6-bullseye-release.tar.gz
            sendspin-armv6-linux-armv6-bullseye-debug.tar.gz
