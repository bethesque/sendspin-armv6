name: Build Debug

on:
  push:
  pull_request:
  workflow_call:

jobs:
  build:
    name: Cross-compile (Debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      # 1. Check for a cached toolchain
      - name: Cache Pi Zero W Toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: rpi-toolchain
          # If you ever update the GCC version, change this key to invalidate the old cache
          key: ${{ runner.os }}-gcc-10.2.0-pi_0-1

      # 2. Only download and extract if the cache missed
      - name: Download Pi Zero W cross-compiler (abhiTronix / Bullseye GCC 10.2.0)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl -fL \
            "https://sourceforge.net/projects/raspberry-pi-cross-compilers/files/Raspberry%20Pi%20GCC%20Cross-Compiler%20Toolchains/Bullseye/GCC%2010.2.0/Raspberry%20Pi%201%2C%20Zero/cross-gcc-10.2.0-pi_0-1.tar.gz/download" \
            -o toolchain.tar.gz
          
          # Extract into a predictable, specific directory and strip the top-level folder
          mkdir -p rpi-toolchain
          tar xf toolchain.tar.gz -C rpi-toolchain --strip-components=1
          rm toolchain.tar.gz

      # 3. Always add to PATH (whether freshly downloaded or restored from cache)
      - name: Add Toolchain to PATH
        run: echo "$PWD/rpi-toolchain/bin" >> "$GITHUB_PATH"

      # 4. Install ALSA headers and ARMv6 library into the cross-compiler sysroot.
      #    See build-release.yml for the rationale on using Debian Bookworm packages.
      - name: Install ALSA into cross-compiler sysroot
        run: |
          TMP=$(mktemp -d)
          BASE="http://deb.debian.org/debian/pool/main/a/alsa-lib"
          curl -fsSL "$BASE/libasound2_1.2.4-1.1_armhf.deb"     -o "$TMP/libasound2.deb"
          curl -fsSL "$BASE/libasound2-dev_1.2.4-1.1_armhf.deb" -o "$TMP/libasound2-dev.deb"
          dpkg-deb --extract "$TMP/libasound2.deb"     "$TMP/alsa/"
          dpkg-deb --extract "$TMP/libasound2-dev.deb" "$TMP/alsa/"
          SYSROOT=$(arm-linux-gnueabihf-gcc -print-sysroot)
          sudo cp -r "$TMP/alsa/usr/include/alsa" "$SYSROOT/usr/include/"
          sudo cp -Pf "$TMP"/alsa/usr/lib/arm-linux-gnueabihf/libasound* "$SYSROOT/usr/lib/"
          rm -rf "$TMP"

      - name: Configure CMake (Debug)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-armv6.cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -G Ninja

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p package
          cp build/sendspin-armv6 package/
          cp config/sendspin-armv6.conf package/
          cp config/sendspin-armv6.service package/
          tar -czf sendspin-armv6-linux-armv6-bullseye-debug.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sendspin-armv6-linux-armv6-bullseye-debug
          path: sendspin-armv6-linux-armv6-bullseye-debug.tar.gz
